---
- name: Patch de pacote (Sentinel AIOps)
  hosts: all
  gather_facts: false

  vars:
    installers:
      "Google Chrome":
        url: "http://10.0.0.67:8081/googlechrome.msi"
        type: msi
      "Microsoft ASP.NET Core 9.0.6 Shared Framework (x64)":
        url: "http://10.0.0.67:8081/aspnetcore-9.0.10-x64.exe"
        type: exe
      "Microsoft ASP.NET Core 8.0.17 Shared Framework (x64)":
        url: "http://10.0.0.67:8081/aspnetcore-8.0.21-x64.exe"
        type: exe
      "Microsoft ASP.NET Core 8.0.17 Shared Framework (x86)":
        url: "http://10.0.0.67:8081/aspnetcore-8.0.21-x86.exe"
        type: exe
    inst: "{{ installers[package] | default({}) }}"
    dest: "C:\\Windows\\Temp\\sentinel_patch.{{ inst.type | default('bin') }}"

  tasks:
    - name: Abortar se o pacote não tiver instalador mapeado
      ansible.builtin.fail:
        msg: "Pacote '{{ package }}' sem instalador mapeado."
      when: inst.url is not defined

    - name: "Baixar o instalador de {{ package }} (LAN)"
      ansible.windows.win_get_url:
        url: "{{ inst.url }}"
        dest: "{{ dest }}"
        force: true
        timeout: 600

    - name: "Instalar/atualizar {{ package }} (MSI)"
      ansible.windows.win_command: msiexec /i {{ dest }} /qn /norestart
      register: msi_out
      when: inst.type == 'msi'
      failed_when: msi_out.rc is defined and msi_out.rc not in [0, 3010]

    - name: "Instalar/atualizar {{ package }} (EXE)"
      ansible.windows.win_command: "{{ dest }} /install /quiet /norestart"
      register: exe_out
      when: inst.type == 'exe'
      failed_when: exe_out.rc is defined and exe_out.rc not in [0, 3010]

    - name: "Remover a versão vulnerável: {{ package }}"
      ansible.windows.win_shell: |
        $name = '{{ package }}'
        $roots = 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*','HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*'
        $item = Get-ItemProperty $roots -ErrorAction SilentlyContinue | Where-Object { $_.DisplayName -eq $name } | Select-Object -First 1
        if (-not $item) { Write-Output 'ja-removido'; exit 0 }
        $p = Start-Process msiexec -ArgumentList "/x $($item.PSChildName) /qn /norestart" -Wait -PassThru
        Write-Output "uninstall rc=$($p.ExitCode)"
        if ($p.ExitCode -notin 0,1605,3010) { exit $p.ExitCode }
      when: inst.type == 'exe'
      register: uninstall_out
      changed_when: "'ja-removido' not in uninstall_out.stdout"

    - name: Remover o instalador temporário
      ansible.windows.win_file:
        path: "{{ dest }}"
        state: absent

    - name: Resultado
      ansible.builtin.debug:
        msg: "patch de {{ package }} aplicado (tipo {{ inst.type }})"
