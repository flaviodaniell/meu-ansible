---
- name: Patch de pacote (Sentinel AIOps)
  hosts: all
  gather_facts: false

  vars:
    installers:
      "Google Chrome":
        url: "http://10.0.0.67:8081/googlechrome.msi"
        type: msi
      "Microsoft ASP.NET Core 9.0.6 Shared Framework (x64)":
        url: "http://10.0.0.67:8081/aspnetcore-9.0.10-x64.exe"
        type: exe
        family: dotnet
        runtime: Microsoft.AspNetCore.App
        vulnerable_version: "9.0.6"
        architecture: x64
      "Microsoft ASP.NET Core 8.0.17 Shared Framework (x64)":
        url: "http://10.0.0.67:8081/aspnetcore-8.0.21-x64.exe"
        type: exe
        family: dotnet
        runtime: Microsoft.AspNetCore.App
        vulnerable_version: "8.0.17"
        architecture: x64
      "Microsoft ASP.NET Core 8.0.17 Shared Framework (x86)":
        url: "http://10.0.0.67:8081/aspnetcore-8.0.21-x86.exe"
        type: exe
        family: dotnet
        runtime: Microsoft.AspNetCore.App
        vulnerable_version: "8.0.17"
        architecture: x86
    inst: "{{ installers[package] | default({}) }}"
    dest: "C:\\Windows\\Temp\\sentinel_patch.{{ inst.type | default('bin') }}"

  tasks:
    - name: Abortar se o pacote não tiver instalador mapeado
      ansible.builtin.fail:
        msg: "Pacote '{{ package }}' sem instalador mapeado."
      when: inst.url is not defined

    - name: Aplicar patch e validar remediação
      block:
        - name: "Baixar o instalador de {{ package }} (LAN)"
          ansible.windows.win_get_url:
            url: "{{ inst.url }}"
            dest: "{{ dest }}"
            force: true
            timeout: 600

        - name: "Instalar/atualizar {{ package }} (MSI)"
          ansible.windows.win_command: msiexec /i {{ dest }} /qn /norestart
          register: msi_out
          when: inst.type == 'msi'
          failed_when: msi_out.rc is defined and msi_out.rc not in [0, 3010]

        - name: "Instalar/atualizar {{ package }} (EXE)"
          ansible.windows.win_command: "{{ dest }} /install /quiet /norestart"
          register: exe_out
          when: inst.type == 'exe'
          failed_when: exe_out.rc is defined and exe_out.rc not in [0, 3010]

        # O instalador .NET adiciona a versão corrigida lado a lado. Removemos
        # todas as entradas da versão vulnerável usando o comando registrado
        # pelo próprio pacote; PSChildName é somente o fallback para MSI.
        - name: "Remover todas as entradas da versão vulnerável: {{ package }}"
          ansible.windows.win_shell: |
            $ErrorActionPreference = 'Stop'
            $name = '{{ package }}'
            $roots = @(
              'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*',
              'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*'
            )
            $items = @(Get-ItemProperty $roots -ErrorAction SilentlyContinue |
              Where-Object { $_.DisplayName -eq $name })

            if ($items.Count -eq 0) {
              Write-Output 'removed=0 already_absent=true reboot_required=false'
              exit 0
            }

            $removed = 0
            $rebootRequired = $false
            foreach ($item in $items) {
              $raw = if ($item.QuietUninstallString) {
                [string]$item.QuietUninstallString
              } elseif ($item.UninstallString) {
                [string]$item.UninstallString
              } elseif ([string]$item.PSChildName -match '^\{[0-9A-Fa-f-]+\}$') {
                "msiexec.exe /x $($item.PSChildName)"
              } else {
                throw "Sem comando de desinstalação para '$($item.DisplayName)' ($($item.PSChildName))"
              }

              if ($raw -match '^(?i)\s*\"?[^\"]*msiexec(?:\.exe)?\"?\s+(.*)$') {
                $file = 'msiexec.exe'
                $arguments = $Matches[1] -replace '(?i)/I(?=\s*\{)', '/x'
                if ($arguments -notmatch '(?i)/q') { $arguments += ' /qn' }
                if ($arguments -notmatch '(?i)/norestart') { $arguments += ' /norestart' }
              } elseif ($raw -match '^\s*\"([^\"]+)\"\s*(.*)$') {
                $file = $Matches[1]
                $arguments = $Matches[2]
                if ($arguments -notmatch '(?i)/(quiet|passive|qn)') {
                  $arguments += ' /quiet /norestart'
                }
              } else {
                $parts = $raw.Trim() -split '\s+', 2
                $file = $parts[0]
                $arguments = if ($parts.Count -gt 1) { $parts[1] } else { '' }
                if ($arguments -notmatch '(?i)/(quiet|passive|qn)') {
                  $arguments += ' /quiet /norestart'
                }
              }

              $process = Start-Process -FilePath $file -ArgumentList $arguments -Wait -PassThru
              Write-Output "uninstall product=$($item.PSChildName) rc=$($process.ExitCode)"
              if ($process.ExitCode -notin 0, 1605, 3010) { exit $process.ExitCode }
              if ($process.ExitCode -eq 3010) { $rebootRequired = $true }
              $removed++
            }
            Write-Output "removed=$removed already_absent=false reboot_required=$($rebootRequired.ToString().ToLower())"
          when: inst.family | default('') == 'dotnet'
          register: uninstall_out
          changed_when: "'removed=0' not in uninstall_out.stdout"

        # Sucesso do instalador não basta: valida tanto o inventário do
        # Windows quanto os diretórios que o host dotnet realmente carrega.
        - name: "Validar remoção e runtime corrigido: {{ package }}"
          ansible.windows.win_shell: |
            $name = '{{ package }}'
            $runtimeName = '{{ inst.runtime }}'
            $vulnerableVersion = '{{ inst.vulnerable_version }}'
            $targetVersion = '{{ target_version }}'
            $architecture = '{{ inst.architecture }}'
            $roots = @(
              'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\*',
              'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*'
            )
            $remainingRegistry = @(Get-ItemProperty $roots -ErrorAction SilentlyContinue |
              Where-Object { $_.DisplayName -eq $name })
            $dotnet = if ($architecture -eq 'x86') {
              'C:\Program Files (x86)\dotnet\dotnet.exe'
            } else {
              'C:\Program Files\dotnet\dotnet.exe'
            }
            if (-not (Test-Path $dotnet)) { throw "dotnet $architecture não encontrado: $dotnet" }

            $runtimes = @(& $dotnet --list-runtimes 2>&1)
            $oldPattern = '^' + [regex]::Escape($runtimeName) + '\s+' +
              [regex]::Escape($vulnerableVersion) + '(?:\s|$)'
            $targetPattern = '^' + [regex]::Escape($runtimeName) + '\s+' +
              [regex]::Escape($targetVersion) + '(?:\s|$)'
            $oldRuntime = @($runtimes | Where-Object { $_ -match $oldPattern })
            $targetRuntime = @($runtimes | Where-Object { $_ -match $targetPattern })

            Write-Output "registry_remaining=$($remainingRegistry.Count)"
            Write-Output "old_runtime_remaining=$($oldRuntime.Count)"
            Write-Output "target_runtime_present=$($targetRuntime.Count)"
            Write-Output ($runtimes -join "`n")
            if ($remainingRegistry.Count -gt 0 -or $oldRuntime.Count -gt 0) {
              throw "Versão vulnerável ainda presente após desinstalação"
            }
            if ($targetRuntime.Count -eq 0) {
              throw "Runtime corrigido $runtimeName $targetVersion ($architecture) não encontrado"
            }
          when: inst.family | default('') == 'dotnet'
          register: validation_out
          changed_when: false

      always:
        - name: Remover o instalador temporário
          ansible.windows.win_file:
            path: "{{ dest }}"
            state: absent

    - name: Resultado
      ansible.builtin.debug:
        msg: "patch de {{ package }} aplicado e validado (tipo {{ inst.type }})"
