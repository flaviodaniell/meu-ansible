---
- name: Patch de pacote (Sentinel AIOps)
  hosts: all
  gather_facts: false

  vars:
    choco_ids:
      "Google Chrome": "googlechrome"
    choco_id: "{{ choco_ids[package] | default('') }}"

  tasks:
    - name: Abortar se o pacote não estiver mapeado
      ansible.builtin.fail:
        msg: "Pacote '{{ package }}' sem choco_id mapeado."
      when: choco_id | length == 0

    - name: "Atualizar {{ package }} via Chocolatey"
      chocolatey.chocolatey.win_chocolatey:
        name: "{{ choco_id }}"
        state: latest
      register: choco_out

    - name: Mostrar resultado
      ansible.builtin.debug:
        msg: "changed={{ choco_out.changed }}"
